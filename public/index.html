<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Auth Pages -->
    <div id="auth-container" class="container">
        <div class="auth-box">
            <h1 id="auth-title">Task Manager</h1>
            
            <!-- Login Form -->
            <form id="login-form" class="auth-form">
                <h2>Login</h2>
                <input type="email" id="login-email" placeholder="Email" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit">Login</button>
                <p class="switch-auth">Don't have an account? <span id="show-register">Register</span></p>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="auth-form hidden">
                <h2>Register</h2>
                <input type="email" id="register-email" placeholder="Email" required>
                <input type="password" id="register-password" placeholder="Password" required>
                <button type="submit">Register</button>
                <p class="switch-auth">Already have an account? <span id="show-login">Login</span></p>
            </form>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard-container" class="container hidden">
        <header class="dashboard-header">
            <h1>Task Dashboard</h1>
            <button id="logout-btn">Logout</button>
        </header>

        <div class="task-section">
            <!-- Add Task Form -->
            <form id="add-task-form" class="task-form">
                <input type="text" id="task-title" placeholder="Task Title" required>
                <textarea id="task-description" placeholder="Task Description" required></textarea>
                <button type="submit">Add Task</button>
            </form>

            <!-- Tasks List -->
            <div id="tasks-list" class="tasks-grid"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
